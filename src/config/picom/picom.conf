#################################
#       Modern System Backend     #
#################################
backend = "glx";              # GPU acceleration for crisp rendering
vsync = true;                 # Eliminates screen tearing completely
use-damage = true;            # Drastically reduces CPU and GPU usage

#################################
#        Rounded Corners        #
#################################
corner-radius = 10;

#################################
#         Modern Shadows        #
#################################
shadow = true;
shadow-radius = 20;           # Soft, diffuse ambient glow
shadow-opacity = 0.40;        # Subtle opacity
shadow-offset-x = -20;
shadow-offset-y = -20;

#################################
#         Fluid Fading          #
#################################
fading = true;
fade-in-step = 0.04;          # Fast, clean window entries
fade-out-step = 0.04;         # Fast, clean window exits
fade-delta = 6;

#################################
#          Global Rules         #
#################################
# This single unified rules format replaces all deprecated legacy excludes.
rules = (
  {
    # Keeps all desktop apps fully solid with no raw background transparency
    match = "any";
    opaque = true;
  },
  {
    # Disables shadows and rounded corners on panels/docks (like Awesome's wibar)
    match = "window_type = 'dock' || window_type = 'desktop'";
    shadow = false;
    corner-radius = 0;
  },
  {
    # Strips out harsh shadows from old GTK window extents
    match = "_GTK_FRAME_EXTENTS@";
    shadow = false;
  }
);

